name: Release preview

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-linux-x86-64:
    name: Verify, build, and publish Linux x86_64
    runs-on: ubuntu-22.04
    env:
      CARGO_TERM_COLOR: always
      RUST_TOOLCHAIN: 1.88.0
      TARGET: x86_64-unknown-linux-gnu
    steps:
      - name: Check out the tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate immutable release source
        run: |
          test "$(git cat-file -t "refs/tags/$GITHUB_REF_NAME")" = tag
          test "$(git rev-parse "refs/tags/$GITHUB_REF_NAME^{commit}")" = "$GITHUB_SHA"
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD

      - name: Validate tag and package versions
        run: bash scripts/verify_release_version.sh "$GITHUB_REF_NAME"

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install the release toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy,rustfmt
          rustup default "$RUST_TOOLCHAIN"

      - name: Verify the tagged source
        run: |
          cargo fmt --all -- --check
          cargo test --workspace --all-targets --locked
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --locked
          node scripts/verify_core_fixtures.mjs
          node scripts/verify_local_api.mjs
          node scripts/verify_docs.mjs
          node scripts/verify_license.mjs
          node scripts/generate_third_party_notices.mjs --check
          node scripts/verify_mermaid.mjs
          node scripts/manage_github_security.mjs --validate
          git diff --check

      - name: Build release binaries
        run: |
          cargo build --release --locked -p synapse-cli --bin synapse
          cargo build --release --locked -p synapse-local-http --bin synapse-local
          cargo build --release --locked -p synapse-publication --bin synapse-present

      - name: Smoke-test release binaries
        run: |
          version="${GITHUB_REF_NAME#v}"
          test "$(target/release/synapse --version)" = "synapse $version"
          test "$(target/release/synapse-local --version)" = "synapse-local $version"
          test "$(target/release/synapse-present --version)" = "synapse-present $version"
          target/release/synapse --help >/dev/null
          target/release/synapse-local --help >/dev/null
          target/release/synapse-present --help >/dev/null
          smoke="$(mktemp -d)"
          trap 'rm -rf "$smoke"' EXIT
          printf 'original\n' > "$smoke/original.bin"
          printf 'current\n' > "$smoke/current.bin"
          printf 'candidate\n' > "$smoke/candidate.bin"
          target/release/synapse creator-run "$smoke/repo" release-smoke \
            "$smoke/original.bin" "$smoke/current.bin" "$smoke/candidate.bin" \
            --subject "Release publication smoke" \
            --creator "Release workflow" \
            --decision defer \
            --rationale "Private smoke rationale" >/dev/null
          target/release/synapse-present export "$smoke/repo" "$smoke/view" \
            --session release-smoke --public --github >/dev/null
          target/release/synapse-present preview "$smoke/view" >/dev/null
          for file in projection.json story.md index.html manifest.json checksums.json target/README.md; do
            test -s "$smoke/view/$file"
          done

      - name: Package release archive
        run: |
          export SOURCE_DATE_EPOCH="$(git show -s --format=%ct "$GITHUB_SHA")"
          bash scripts/package_release.sh "$GITHUB_REF_NAME" "$TARGET" dist

      - name: Smoke-test the packaged archive
        run: |
          bundle="synapsegit-$GITHUB_REF_NAME-$TARGET"
          unpacked="$(mktemp -d)"
          trap 'rm -rf "$unpacked"' EXIT
          tar -xzf "dist/$bundle.tar.gz" -C "$unpacked"
          for file in LICENSE THIRD_PARTY_NOTICES.md SECURITY.md CHANGELOG.md; do
            test -s "$unpacked/$bundle/$file"
          done
          version="${GITHUB_REF_NAME#v}"
          test "$("$unpacked/$bundle/synapse" --version)" = "synapse $version"
          test "$("$unpacked/$bundle/synapse-local" --version)" = "synapse-local $version"
          test "$("$unpacked/$bundle/synapse-present" --version)" = "synapse-present $version"
          "$unpacked/$bundle/synapse" --help >/dev/null
          "$unpacked/$bundle/synapse-local" --help >/dev/null
          "$unpacked/$bundle/synapse-present" --help >/dev/null
          printf 'original\n' > "$unpacked/original.bin"
          printf 'current\n' > "$unpacked/current.bin"
          printf 'candidate\n' > "$unpacked/candidate.bin"
          "$unpacked/$bundle/synapse" creator-run "$unpacked/repo" packaged-smoke \
            "$unpacked/original.bin" "$unpacked/current.bin" "$unpacked/candidate.bin" \
            --subject "Packaged publication smoke" \
            --creator "Release workflow" \
            --decision reject \
            --rationale "Private packaged smoke rationale" >/dev/null
          "$unpacked/$bundle/synapse-present" export "$unpacked/repo" "$unpacked/view" \
            --session packaged-smoke --public --github >/dev/null
          "$unpacked/$bundle/synapse-present" preview "$unpacked/view" >/dev/null

      - name: Attest the release archive
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: dist/synapsegit-${{ github.ref_name }}-${{ env.TARGET }}.tar.gz

      - name: Create or resume the draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            test "$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)" = true
            gh release edit "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "SynapseGit $GITHUB_REF_NAME — Stage 0 preview" \
              --notes-file "docs/releases/$GITHUB_REF_NAME.md" \
              --draft \
              --prerelease \
              --latest=false
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "SynapseGit $GITHUB_REF_NAME — Stage 0 preview" \
              --notes-file "docs/releases/$GITHUB_REF_NAME.md" \
              --draft \
              --prerelease \
              --latest=false
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)" = true
          gh release upload "$GITHUB_REF_NAME" \
            "dist/synapsegit-$GITHUB_REF_NAME-$TARGET.tar.gz" \
            dist/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Publish the prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false \
            --prerelease \
            --latest=false
