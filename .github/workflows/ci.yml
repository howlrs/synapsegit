name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Rust, protocol, and documentation
    runs-on: ubuntu-22.04
    env:
      CARGO_TERM_COLOR: always
      RUST_TOOLCHAIN: 1.88.0
    steps:
      - name: Check out the source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install the Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy,rustfmt
          rustup default "$RUST_TOOLCHAIN"

      - name: Verify Rust formatting, tests, lint, and docs
        run: |
          cargo fmt --all -- --check
          cargo test --workspace --all-targets --locked
          cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
          RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --locked

      - name: Verify protocol and documentation contracts
        run: |
          for script in scripts/*.mjs; do node --check "$script"; done
          bash -n scripts/*.sh
          node scripts/verify_core_fixtures.mjs
          node scripts/verify_local_api.mjs
          node scripts/verify_docs.mjs
          node scripts/verify_license.mjs
          node scripts/generate_third_party_notices.mjs --check
          node scripts/verify_mermaid.mjs
          node scripts/manage_github_security.mjs --validate
          git diff --check
