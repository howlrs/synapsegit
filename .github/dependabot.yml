version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    ignore:
      # rusqlite 0.40.x pulls libsqlite3-sys 0.38.1, which uses the
      # cfg_select! standard macro stabilized after the workspace's Rust 1.88.
      - dependency-name: rusqlite
        versions: ["0.40.x"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
